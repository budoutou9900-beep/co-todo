<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="co-todo">
<meta name="theme-color" content="#0f0f14">
<title>co-todo</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://accounts.google.com/gsi/client" async></script>
</head>
<body>
<div id="app-root">

  <!-- login -->
  <div id="login-screen" class="login-screen" style="display:none">
    <div>
      <div class="login-title">co-todo</div>
    </div>
    <button id="login-btn" class="login-btn">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.13-.85 2.09-1.81 2.73v2.27h2.92c1.7-1.57 2.69-3.88 2.69-6.64z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.27c-.81.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.71H.96v2.33C2.44 15.98 5.48 18 9 18z"/><path fill="#FBBC05" d="M3.97 10.7A5.41 5.41 0 0 1 3.68 9c0-.59.1-1.16.29-1.7V4.97H.96A8.997 8.997 0 0 0 0 9c0 1.45.35 2.83.96 4.03l3.01-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.97l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
      Googleでログイン
    </button>
    <div id="login-error" style="font-size:11.5px;color:rgba(255,120,100,0.85);max-width:320px;word-break:break-word"></div>
  </div>

  <!-- app -->
  <div id="app-screen" style="display:none;flex:1;display:flex;flex-direction:column;min-height:0;position:relative">
    <div class="app-header">
      <div class="app-brand">
        <img src="icons/icon-192.png" alt="" class="app-logo" />
        <span class="app-brand-name">co-todo</span>
      </div>
      <span id="signout-btn" class="signout-btn">ログアウト</span>
    </div>
    <div id="screen-content" style="flex:1;display:flex;flex-direction:column;min-height:0"></div>

    <div class="tab-bar-wrap">
      <div class="tab-bar-fade"></div>
      <!-- 右上 = タスク追加（紫の浮きボタン） -->
      <div id="open-sheet-btn" class="add-fab">
        <svg width="20" height="20" viewBox="0 0 18 18" fill="none"><path d="M9 2.5v13M2.5 9h13" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <!-- その左 = プロジェクト追加（プロジェクトモード時のみ表示） -->
      <div id="add-project-fab" class="add-fab add-project-fab" style="display:none">
        <svg width="20" height="20" viewBox="0 0 22 22" fill="none"><rect x="3" y="3" width="16" height="6" rx="1.5" stroke="#fff" stroke-width="1.7"/><rect x="3" y="13" width="16" height="6" rx="1.5" stroke="#fff" stroke-width="1.7"/></svg>
      </div>
      <div class="tab-bar">
        <div class="tab-item" data-view="today">
          <svg id="tab-icon-today" width="21" height="21" viewBox="0 0 22 22" fill="none"><rect x="3" y="5" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3 9h16M8 3v4M14 3v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span class="tab-label" data-label="today">今日</span>
        </div>
        <div class="tab-item" data-view="week">
          <svg id="tab-icon-week" width="21" height="21" viewBox="0 0 22 22" fill="none"><rect x="3" y="5" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3 9h16M7 13h3M7 16h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span class="tab-label" data-label="week">今週</span>
        </div>
        <div class="tab-item" data-view="projects">
          <svg id="tab-icon-projects" width="21" height="21" viewBox="0 0 22 22" fill="none"><rect x="3" y="3" width="16" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="13" width="16" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>
          <span class="tab-label" data-label="projects">プロジェクト</span>
        </div>
      </div>
    </div>

    <div id="ritual-container"></div>
    <div id="sheet-container"></div>
    <div id="toast-container"></div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
